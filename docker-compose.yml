services:
  backend:
    build: ./backend
    container_name: pixl-backend
    restart: unless-stopped
    volumes:
      - pixl_uploads:/app/uploads
      - pixl_processed:/app/processed
      - pixl_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: pixl-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pixl_uploads:
  pixl_processed:
  pixl_data:
